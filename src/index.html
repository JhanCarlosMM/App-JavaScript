<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Productos App</title>

    <link
      rel="stylesheet"
      href="https://stackpath.bootstrapcdn.com/bootswatch/4.5.2/cosmo/bootstrap.min.css"
    />


    <link rel="stylesheet" href="App.css" />
  </head>

  <body>
    <nav class="navbar navbar-dark bg-dark">
      <a class="navbar-brand" href="#">Productos App</a>
    </nav>

    <div class="container">
      <div id="App" class="app-layout">
        
        <div class="left-section">
          
          <div class="card">
            <div class="card-header">
              <h4>Agregar un Producto</h4>
            </div>
            <form id="product-form" class="card-body">
              <div class="form-group">
                <input
                  type="text"
                  id="name"
                  placeholder="Nombre Producto"
                  class="form-control"
                />
              </div>
              <div class="form-group">
                <input
                  type="number"
                  id="price"
                  step="0.01"
                  placeholder="Precio Producto"
                  class="form-control"
                />
              </div>
              <div class="form-group">
                <input
                  type="number"
                  id="year"
                  min="1900"
                  max="2099"
                  step="1"
                  value="2018"
                  class="form-control"
                />
              </div>
              <input
                type="submit"
                value="Agregar"
                class="btn btn-primary btn-block"
              />
            </form>
          </div>

          <div id="product-list"></div>
        </div>

        
        <div class="right-section">
          <div class="card">
            <div class="card-header">
              <h4>Productos Agregados</h4>
            </div>
            <div id="products-summary" class="products-summary-list">
              <p class="empty-message">No hay productos agregados</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="App.js" type="module"></script>
  </body>
</html>
